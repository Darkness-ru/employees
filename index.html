<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список сотрудников</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #346928 0%, #E88C2E 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header img {
            height: 80px;
            margin-bottom: 15px;
        }

        .search-container {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 30px;
            font-size: 16px;
        }

        .stats {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 10px;
            display: inline-block;
        }

        .table-container {
            padding: 20px 30px 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #346928 0%, #E88C2E 100%);
            color: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .email-link {
            color: #667eea;
            text-decoration: none;
        }

        .footer {
            background: #f8f9fa;
            padding: 15px 30px;
            border-top: 2px solid #e9ecef;
        }

        .export-btn {
            background: linear-gradient(135deg, #6a3093 0%, #a044ff 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
        }

        .pagination {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            background: white;
            border: 2px solid #e9ecef;
            color: #495057;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .page-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Логотип">
            <h1>👥 Список сотрудников</h1>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по имени или email...">
            </div>
            <div class="stats" id="stats">
                Всего: <span id="totalCount">0</span>
            </div>
        </div>

        <div class="table-container">
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>№</th>
                        <th>ФИО Сотрудника</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="3">Загрузка...</td></tr>
                </tbody>
            </table>
            
            <div class="pagination">
                <button class="page-btn" id="prevPage" disabled>←</button>
                <div id="pageNumbers"></div>
                <button class="page-btn" id="nextPage" disabled>→</button>
                <select id="itemsPerPage">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>

        <div class="footer">
            <button class="export-btn" id="exportBtn">📥 Экспорт в CSV</button>
        </div>
    </div>

    <script>
        // ДАННЫЕ НАПРЯМУЮ ИЗ ФАЙЛА (ВРЕМЕННОЕ РЕШЕНИЕ)
        const employees = [
            { "name": "Алексеева Марина Александровна", "email": "alekseeva@transles.biz" },
            { "name": "Аленичева Ирина Васильевна", "email": "alenicheva_iv@transles.biz" },
            { "name": "Алышева Юлия Олеговна", "email": "alysheva_yo@transles.biz" },
            { "name": "Андриянова Татьяна Анатольевна", "email": "Andriyanova_TA@transles.biz" },
            { "name": "Артамонов Андрей Андреевич", "email": "artamonov_aa@transles.biz" },
            { "name": "Артамонов Артем Анатольевич ИТ", "email": "Artamonov_a@transles.biz" },
            { "name": "Архангельский Андрей Михайлович", "email": "arhangelsky@transles.biz" },
            { "name": "Афинова Ольга Викторовна", "email": "afinova_ov@transles.biz" },
            { "name": "Багаева Алёна Ивановна", "email": "bagaeva.kras@transles.biz" },
            { "name": "Балабанова Рената Ринатовна", "email": "balabanova_rr@transles.biz" }
        ]; // Добавьте остальных сотрудников по аналогии

        let filteredEmployees = [...employees];
        let currentPage = 1;
        let itemsPerPage = 20;
        let searchTerm = '';

        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const totalCountSpan = document.getElementById('totalCount');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageNumbersDiv = document.getElementById('pageNumbers');
        const itemsPerPageSelect = document.getElementById('itemsPerPage');
        const exportBtn = document.getElementById('exportBtn');

        // Обновление статистики
        totalCountSpan.textContent = employees.length;

        function renderTable() {
            let startIndex = (currentPage - 1) * itemsPerPage;
            let endIndex = Math.min(startIndex + itemsPerPage, filteredEmployees.length);
            let paginatedEmployees = filteredEmployees.slice(startIndex, endIndex);

            let html = '';
            paginatedEmployees.forEach((emp, index) => {
                html += `
                    <tr>
                        <td>${startIndex + index + 1}</td>
                        <td>${emp.name}</td>
                        <td><a href="mailto:${emp.email}" class="email-link">${emp.email}</a></td>
                    </tr>
                `;
            });
            
            if (html === '') {
                tableBody.innerHTML = '<tr><td colspan="3">😕 Ничего не найдено</td></tr>';
            } else {
                tableBody.innerHTML = html;
            }
        }

        function filterEmployees() {
            if (!searchTerm.trim()) {
                filteredEmployees = [...employees];
            } else {
                const term = searchTerm.toLowerCase().trim();
                filteredEmployees = employees.filter(emp => 
                    emp.name.toLowerCase().includes(term) || 
                    emp.email.toLowerCase().includes(term)
                );
            }
            currentPage = 1;
            renderTable();
        }

        searchInput.addEventListener('input', filterEmployees);
        
        itemsPerPageSelect.addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            renderTable();
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            if (currentPage < Math.ceil(filteredEmployees.length / itemsPerPage)) {
                currentPage++;
                renderTable();
            }
        });

        exportBtn.addEventListener('click', () => {
            const dataToExport = searchTerm ? filteredEmployees : employees;
            let csvContent = "ФИО;Email\n";
            dataToExport.forEach(emp => {
                csvContent += `"${emp.name}","${emp.email}"\n`;
            });
            
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'employees.csv';
            link.click();
        });

        renderTable();
    </script>
</body>
</html>
