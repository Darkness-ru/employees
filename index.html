<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список сотрудников</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5dc; /* Светло-бежевый */
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #346928 0%, #E88C2E 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            font-style: italic;
        }

        .header img {
            height: 80px;
            margin-bottom: 15px;
        }

        .search-container {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            padding-left: 45px;
            border: 2px solid #e1e5e9;
            border-radius: 30px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23667eea" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 15px center;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .stats {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 500;
            color: #495057;
        }

        .table-container {
            padding: 20px 30px 30px;
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        thead {
            background: linear-gradient(135deg, #346928 0%, #E88C2E 100%);
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e9ecef;
            color: #495057;
        }

        tbody tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: #f8f9fa;
            transform: scale(1.01);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .email-link {
            color: #667eea;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
        }

        .email-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .email-link::before {
            content: '✉️';
            font-size: 0.9em;
            opacity: 0.7;
        }

        .empty-row {
            background: #f1f3f5;
            font-style: italic;
            color: #868e96;
        }

        .empty-row td {
            padding: 15px;
            text-align: center;
        }

        .footer {
            background: #f8f9fa;
            padding: 15px 30px;
            border-top: 2px solid #e9ecef;
            color: #868e96;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .export-btn {
            background: linear-gradient(135deg, #6a3093 0%, #a044ff 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .export-btn:active {
            transform: translateY(0);
        }

        .pagination {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            background: white;
            border: 2px solid #e9ecef;
            color: #495057;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .page-btn:hover:not(:disabled) {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .page-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .items-per-page {
            padding: 8px 15px;
            border: 2px solid #e9ecef;
            border-radius: 20px;
            font-size: 0.95em;
            color: #495057;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .search-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .footer {
                flex-direction: column;
                text-align: center;
            }
            
            th, td {
                padding: 10px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png?v=2" alt="Логотип компании">
            <h1>👥 Список сотрудников</h1>
            <p>Полный перечень сотрудников с контактными email-адресами</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по имени или email..." autocomplete="off">
            </div>
            <div class="stats" id="stats">
                Всего: <span id="totalCount">0</span>
            </div>
        </div>

        <div class="table-container">
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>№</th>
                        <th>ФИО Сотрудника</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Данные будут загружены через JavaScript -->
                </tbody>
            </table>
            
            <div class="pagination">
                <button class="page-btn" id="prevPage" disabled>←</button>
                <div id="pageNumbers" style="display: flex; gap: 5px;"></div>
                <button class="page-btn" id="nextPage" disabled>→</button>
                <select id="itemsPerPage" class="items-per-page">
                    <option value="20">20 на странице</option>
                    <option value="50">50 на странице</option>
                    <option value="100">100 на странице</option>
                    <option value="all">Все</option>
                </select>
            </div>
        </div>

        <div class="footer">
            <div>📋 Данные актуальны на момент загрузки</div>
            <button class="export-btn" id="exportBtn">
                <span>📥</span> Экспорт в CSV
            </button>
        </div>
    </div>

    <script>
        // Данные сотрудников будут заменяться автоматически через convert.js
        const employees = [];

        // Текущее состояние
        let currentPage = 1;
        let itemsPerPage = 20;
        let searchTerm = '';
        let filteredEmployees = [...employees];

        // Элементы DOM
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const totalCountSpan = document.getElementById('totalCount');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageNumbersDiv = document.getElementById('pageNumbers');
        const itemsPerPageSelect = document.getElementById('itemsPerPage');
        const exportBtn = document.getElementById('exportBtn');

        // Обновление статистики
        totalCountSpan.textContent = employees.length;

        // Функция фильтрации
        function filterEmployees() {
            if (!searchTerm.trim()) {
                filteredEmployees = [...employees];
            } else {
                const term = searchTerm.toLowerCase().trim();
                filteredEmployees = employees.filter(emp => 
                    emp.name.toLowerCase().includes(term) || 
                    emp.email.toLowerCase().includes(term)
                );
            }
            currentPage = 1;
            renderTable();
        }

        // Функция рендеринга таблицы
        function renderTable() {
            let startIndex, endIndex, paginatedEmployees;
            
            if (itemsPerPage === 'all') {
                paginatedEmployees = filteredEmployees;
                startIndex = 0;
                endIndex = filteredEmployees.length;
            } else {
                const perPage = parseInt(itemsPerPage);
                startIndex = (currentPage - 1) * perPage;
                endIndex = Math.min(startIndex + perPage, filteredEmployees.length);
                paginatedEmployees = filteredEmployees.slice(startIndex, endIndex);
            }

            if (paginatedEmployees.length === 0) {
                tableBody.innerHTML = `
                    <tr class="empty-row">
                        <td colspan="3">😕 По вашему запросу ничего не найдено</td>
                    </tr>
                `;
            } else {
                let html = '';
                paginatedEmployees.forEach((emp, index) => {
                    const rowNumber = itemsPerPage === 'all' ? index + 1 : startIndex + index + 1;
                    html += `
                        <tr>
                            <td>${rowNumber}</td>
                            <td>${emp.name}</td>
                            <td>
                                <a href="mailto:${emp.email}" class="email-link">
                                    ${emp.email}
                                </a>
                            </td>
                        </tr>
                    `;
                });
                tableBody.innerHTML = html;
            }

            updatePagination();
        }

        // Обновление пагинации
        function updatePagination() {
            const totalPages = itemsPerPage === 'all' ? 1 : Math.ceil(filteredEmployees.length / parseInt(itemsPerPage));
            
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;

            let pageNumbersHtml = '';
            const maxVisiblePages = 5;
            
            if (totalPages > 0) {
                let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
                let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
                
                if (endPage - startPage + 1 < maxVisiblePages) {
                    startPage = Math.max(1, endPage - maxVisiblePages + 1);
                }

                if (startPage > 1) {
                    pageNumbersHtml += `<button class="page-btn" data-page="1">1</button>`;
                    if (startPage > 2) {
                        pageNumbersHtml += `<span style="padding: 0 5px;">...</span>`;
                    }
                }

                for (let i = startPage; i <= endPage; i++) {
                    pageNumbersHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) {
                        pageNumbersHtml += `<span style="padding: 0 5px;">...</span>`;
                    }
                    pageNumbersHtml += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
                }
            }

            pageNumbersDiv.innerHTML = pageNumbersHtml;

            // Добавляем обработчики для кнопок страниц
            document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPage = parseInt(btn.dataset.page);
                    renderTable();
                });
            });
        }

        // Обработчики событий
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            filterEmployees();
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = itemsPerPage === 'all' ? 1 : Math.ceil(filteredEmployees.length / parseInt(itemsPerPage));
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        });

        itemsPerPageSelect.addEventListener('change', (e) => {
            itemsPerPage = e.target.value;
            currentPage = 1;
            renderTable();
        });

        // Экспорт в CSV
        exportBtn.addEventListener('click', () => {
            const dataToExport = searchTerm ? filteredEmployees : employees;
            
            if (dataToExport.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            // Создаем CSV контент
            let csvContent = "ФИО;Email\n";
            dataToExport.forEach(emp => {
                csvContent += `"${emp.name}","${emp.email}"\n`;
            });

            // Создаем и скачиваем файл
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'employees.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });

        // Инициализация
        renderTable();
    </script>
</body>
</html>
