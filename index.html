<script>
    // URL вашего веб-приложения Google Apps Script
    const API_URL = 'https://script.google.com/macros/s/AKfycbx8WlT3VX9X9X9X9X9X9X9X9X9X9X9X/exec';
    
    // Данные сотрудников
    let employees = [];
    let filteredEmployees = [];
    
    // Текущее состояние
    let currentPage = 1;
    let itemsPerPage = 20;
    let searchTerm = '';

    // Элементы DOM
    const tableBody = document.getElementById('tableBody');
    const searchInput = document.getElementById('searchInput');
    const totalCountSpan = document.getElementById('totalCount');
    const prevPageBtn = document.getElementById('prevPage');
    const nextPageBtn = document.getElementById('nextPage');
    const pageNumbersDiv = document.getElementById('pageNumbers');
    const itemsPerPageSelect = document.getElementById('itemsPerPage');
    const exportBtn = document.getElementById('exportBtn');

    // Загрузка данных из Google Sheets
    async function loadEmployees() {
        try {
            console.log('Загрузка данных...');
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (data.error) {
                console.error('Ошибка API:', data.error);
                return;
            }
            
            employees = data.employees || [];
            console.log(`Загружено ${employees.length} сотрудников`);
            console.log('Первый сотрудник:', employees[0]?.name);
            
            // Обновляем счетчик
            totalCountSpan.textContent = employees.length;
            filteredEmployees = [...employees];
            
            // Рендерим таблицу
            renderTable();
            
        } catch (error) {
            console.error('Ошибка загрузки:', error);
        }
    }

    // Функция фильтрации
    function filterEmployees() {
        if (!searchTerm.trim()) {
            filteredEmployees = [...employees];
        } else {
            const term = searchTerm.toLowerCase().trim();
            filteredEmployees = employees.filter(emp => 
                emp.name.toLowerCase().includes(term) || 
                emp.email.toLowerCase().includes(term)
            );
        }
        currentPage = 1;
        renderTable();
    }

    // Функция рендеринга таблицы
    function renderTable() {
        if (!employees || employees.length === 0) {
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="3">😕 Загрузка данных...</td>
                </tr>
            `;
            return;
        }
        
        let startIndex, endIndex, paginatedEmployees;
        
        if (itemsPerPage === 'all') {
            paginatedEmployees = filteredEmployees;
            startIndex = 0;
            endIndex = filteredEmployees.length;
        } else {
            const perPage = parseInt(itemsPerPage);
            startIndex = (currentPage - 1) * perPage;
            endIndex = Math.min(startIndex + perPage, filteredEmployees.length);
            paginatedEmployees = filteredEmployees.slice(startIndex, endIndex);
        }

        if (paginatedEmployees.length === 0) {
            tableBody.innerHTML = `
                <tr class="empty-row">
                    <td colspan="3">😕 По вашему запросу ничего не найдено</td>
                </tr>
            `;
        } else {
            let html = '';
            paginatedEmployees.forEach((emp, index) => {
                const rowNumber = itemsPerPage === 'all' ? index + 1 : startIndex + index + 1;
                html += `
                    <tr>
                        <td>${rowNumber}</td>
                        <td>${emp.name}</td>
                        <td>
                            <a href="mailto:${emp.email}" class="email-link">
                                ${emp.email}
                            </a>
                        </td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;
        }

        updatePagination();
    }

    // Обновление пагинации
    function updatePagination() {
        const totalPages = itemsPerPage === 'all' ? 1 : Math.ceil(filteredEmployees.length / parseInt(itemsPerPage));
        
        prevPageBtn.disabled = currentPage === 1;
        nextPageBtn.disabled = currentPage === totalPages || totalPages === 0;

        let pageNumbersHtml = '';
        const maxVisiblePages = 5;
        
        if (totalPages > 0) {
            let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
            let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
            
            if (endPage - startPage + 1 < maxVisiblePages) {
                startPage = Math.max(1, endPage - maxVisiblePages + 1);
            }

            if (startPage > 1) {
                pageNumbersHtml += `<button class="page-btn" data-page="1">1</button>`;
                if (startPage > 2) {
                    pageNumbersHtml += `<span style="padding: 0 5px;">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                pageNumbersHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageNumbersHtml += `<span style="padding: 0 5px;">...</span>`;
                }
                pageNumbersHtml += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
            }
        }

        pageNumbersDiv.innerHTML = pageNumbersHtml;

        document.querySelectorAll('.page-btn[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentPage = parseInt(btn.dataset.page);
                renderTable();
            });
        });
    }

    // Обработчики событий
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            filterEmployees();
        });
    }

    if (prevPageBtn) {
        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });
    }

    if (nextPageBtn) {
        nextPageBtn.addEventListener('click', () => {
            const totalPages = itemsPerPage === 'all' ? 1 : Math.ceil(filteredEmployees.length / parseInt(itemsPerPage));
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
            }
        });
    }

    if (itemsPerPageSelect) {
        itemsPerPageSelect.addEventListener('change', (e) => {
            itemsPerPage = e.target.value;
            currentPage = 1;
            renderTable();
        });
    }

    if (exportBtn) {
        exportBtn.addEventListener('click', () => {
            const dataToExport = searchTerm ? filteredEmployees : employees;
            
            if (dataToExport.length === 0) {
                alert('Нет данных для экспорта');
                return;
            }

            let csvContent = "ФИО;Email\n";
            dataToExport.forEach(emp => {
                csvContent += `"${emp.name}","${emp.email}"\n`;
            });

            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'employees.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        });
    }

    // Загружаем данные при старте
    loadEmployees();
    
    // Обновляем каждые 5 минут
    setInterval(loadEmployees, 5 * 60 * 1000);
</script>
