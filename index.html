<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список сотрудников</title>
    <style>
        /* ВАШИ СТИЛИ (оставьте те, что уже есть) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5dc;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #346928 0%, #E88C2E 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header img {
            height: 80px;
            margin-bottom: 15px;
        }

        .search-container {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 30px;
            font-size: 16px;
        }

        .stats {
            background: #e9ecef;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 10px;
            display: inline-block;
        }

        .table-container {
            padding: 20px 30px 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #346928 0%, #E88C2E 100%);
            color: white;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .email-link {
            color: #667eea;
            text-decoration: none;
        }

        .footer {
            background: #f8f9fa;
            padding: 15px 30px;
            border-top: 2px solid #e9ecef;
        }

        .export-btn {
            background: linear-gradient(135deg, #6a3093 0%, #a044ff 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
        }

        .pagination {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .page-btn {
            background: white;
            border: 2px solid #e9ecef;
            color: #495057;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .page-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="Логотип">
            <h1>👥 Список сотрудников</h1>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по имени или email...">
            </div>
            <div class="stats" id="stats">
                Всего: <span id="totalCount">0</span>
            </div>
        </div>

        <div class="table-container">
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>№</th>
                        <th>ФИО Сотрудника</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="3">Загрузка...</td></tr>
                </tbody>
            </table>
            
            <div class="pagination">
                <button class="page-btn" id="prevPage" disabled>←</button>
                <div id="pageNumbers"></div>
                <button class="page-btn" id="nextPage" disabled>→</button>
                <select id="itemsPerPage">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>

        <div class="footer">
            <button class="export-btn" id="exportBtn">📥 Экспорт в CSV</button>
        </div>
    </div>

    <script>
        // URL вашего веб-приложения (ЗАМЕНИТЕ НА ВАШ!)
        const API_URL = 'https://script.google.com/macros/s/AKfycbx8WlT3VX9X9X9X9X9X9X9X9X9X9X9X/exec';
        
        // Данные сотрудников
        let employees = [];
        let filteredEmployees = [];
        
        // Текущее состояние
        let currentPage = 1;
        let itemsPerPage = 20;
        let searchTerm = '';

        // Элементы DOM
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const totalCountSpan = document.getElementById('totalCount');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageNumbersDiv = document.getElementById('pageNumbers');
        const itemsPerPageSelect = document.getElementById('itemsPerPage');
        const exportBtn = document.getElementById('exportBtn');

        // Функция для JSONP-запроса (ОБХОДИТ CORS)
        function loadEmployeesWithJSONP() {
            return new Promise((resolve, reject) => {
                // Создаем уникальное имя callback-функции
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                
                // Создаем функцию в глобальной области видимости
                window[callbackName] = function(data) {
                    // Удаляем скрипт и функцию после загрузки
                    document.body.removeChild(script);
                    delete window[callbackName];
                    
                    if (data.error) {
                        reject(new Error(data.error));
                    } else {
                        resolve(data);
                    }
                };
                
                // Создаем тег script для JSONP-запроса
                const script = document.createElement('script');
                script.src = API_URL + '?callback=' + callbackName;
                
                // Обработка ошибок
                script.onerror = function() {
                    document.body.removeChild(script);
                    delete window[callbackName];
                    reject(new Error('Ошибка загрузки данных'));
                };
                
                // Добавляем скрипт на страницу (он выполнится автоматически)
                document.body.appendChild(script);
            });
        }

        // Загрузка данных
        async function loadEmployees() {
            try {
                console.log('Загрузка данных через JSONP...');
                tableBody.innerHTML = '<tr><td colspan="3">Загрузка данных...</td></tr>';
                
                const data = await loadEmployeesWithJSONP();
                
                employees = data.employees || [];
                console.log(`Загружено ${employees.length} сотрудников`);
                
                // Обновляем счетчик
                totalCountSpan.textContent = employees.length;
                filteredEmployees = [...employees];
                
                // Рендерим таблицу
                renderTable();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                tableBody.innerHTML = '<tr><td colspan="3">Ошибка загрузки данных</td></tr>';
            }
        }

        // Функция рендеринга таблицы
        function renderTable() {
            if (!employees || employees.length === 0) return;
            
            let startIndex = (currentPage - 1) * itemsPerPage;
            let endIndex = Math.min(startIndex + itemsPerPage, filteredEmployees.length);
            let paginatedEmployees = filteredEmployees.slice(startIndex, endIndex);

            if (paginatedEmployees.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3">😕 Ничего не найдено</td></tr>';
                return;
            }

            let html = '';
            paginatedEmployees.forEach((emp, index) => {
                html += `
                    <tr>
                        <td>${startIndex + index + 1}</td>
                        <td>${emp.name}</td>
                        <td><a href="mailto:${emp.email}" class="email-link">${emp.email}</a></td>
                    </tr>
                `;
            });
            tableBody.innerHTML = html;
        }

        // Функция фильтрации
        function filterEmployees() {
            if (!searchTerm.trim()) {
                filteredEmployees = [...employees];
            } else {
                const term = searchTerm.toLowerCase().trim();
                filteredEmployees = employees.filter(emp => 
                    emp.name.toLowerCase().includes(term) || 
                    emp.email.toLowerCase().includes(term)
                );
            }
            currentPage = 1;
            renderTable();
        }

        // Обработчики событий
        searchInput.addEventListener('input', filterEmployees);
        
        itemsPerPageSelect.addEventListener('change', (e) => {
            itemsPerPage = parseInt(e.target.value);
            currentPage = 1;
            renderTable();
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        });

        nextPageBtn.addEventListener('click', () => {
            if (currentPage < Math.ceil(filteredEmployees.length / itemsPerPage)) {
                currentPage++;
                renderTable();
            }
        });

        exportBtn.addEventListener('click', () => {
            const dataToExport = searchTerm ? filteredEmployees : employees;
            let csvContent = "ФИО;Email\n";
            dataToExport.forEach(emp => {
                csvContent += `"${emp.name}","${emp.email}"\n`;
            });
            
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'employees.csv';
            link.click();
        });

        // Загружаем данные при старте
        loadEmployees();
        
        // Обновляем каждые 5 минут
        setInterval(loadEmployees, 5 * 60 * 1000);
    </script>
</body>
</html>
