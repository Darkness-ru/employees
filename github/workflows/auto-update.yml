name: Автообновление из Google Sheets

on:
  schedule:
    - cron: '*/30 * * * *'  # Проверка каждые 30 минут
  workflow_dispatch:  # Можно запускать вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
      
      - name: Скачать таблицу
        run: node fetch-sheet.js
      
      - name: Конвертировать в HTML
        run: node convert.js
      
      - name: Сохранить изменения
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add employees.csv index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Автообновление данных"
          git push
